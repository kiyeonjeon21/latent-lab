defaults:
  - base
  - _self_

name: llm_eval_custom
description: "Custom evaluation with prompt-expected pairs"
domain: llm
task: evaluation

model:
  pretrained: mlx-community/Llama-3.2-3B-Instruct-4bit

eval_type: custom
test_cases:
  - prompt: "What is the capital of France?"
    expected: "Paris"
  - prompt: "What is 2 + 2?"
    expected: "4"
  - prompt: "Who wrote Romeo and Juliet?"
    expected: "Shakespeare"

tags: [llm, evaluation]

defaults:
  - base
  - _self_

name: nlp_text_classification
description: "Text classification with HuggingFace Transformers"
domain: nlp
task: classification

data:
  name: sst2
  path: ""

model:
  name: distilbert-sst2
  framework: hf
  pretrained: distilbert-base-uncased-finetuned-sst-2-english

training:
  epochs: 5
  batch_size: 32
  learning_rate: 2e-5
  seed: 42

tags:
  - nlp
  - classification
  - transformers

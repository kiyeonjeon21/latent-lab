defaults:
  - base
  - _self_

name: llm_finetune_lora
description: "LoRA fine-tuning with MLX"
domain: llm
task: finetune

data:
  path: data/processed/finetune

model:
  pretrained: mlx-community/Mistral-7B-Instruct-v0.3-4bit
  quantize: 4

training:
  batch_size: 4
  learning_rate: 1e-4
  max_steps: 600

lora:
  enabled: true
  rank: 8
  alpha: 16.0
  layers: 16

tags: [llm, finetune, lora]
